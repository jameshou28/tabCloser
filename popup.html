<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 20px;
      color: #333;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
    
    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    
    .add-btn {
      background-color: #007bff;
      color: white;
    }
    
    .add-btn:hover {
      background-color: #0056b3;
    }
    
    .url-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 10px;
    }
    
    .url-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .url-item:last-child {
      border-bottom: none;
    }
    
    .url-text {
      flex: 1;
      font-size: 14px;
      word-break: break-all;
      color: #555;
    }
    
    .remove-btn {
      background-color: #dc3545;
      color: white;
      padding: 4px 8px;
      font-size: 12px;
    }
    
    .remove-btn:hover {
      background-color: #c82333;
    }
    
    .empty-state {
      text-align: center;
      color: #999;
      font-style: italic;
      padding: 20px;
    }
    
    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Tab Closer</h1>
  
  <div class="input-group">
    <input type="text" id="urlInput" placeholder="Enter URL to block (e.g., example.com)">
    <button id="addBtn" class="add-btn">Add</button>
  </div>
  
  <div id="urlList" class="url-list">
    <div class="empty-state">No blocked URLs yet</div>
  </div>
  
  <div class="help-text">
    Enter URLs or domain names to block. The extension will automatically close tabs that match these URLs.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
